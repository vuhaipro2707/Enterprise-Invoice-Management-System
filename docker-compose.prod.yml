services:
  # 1. Database (No Forward public)
  db:
    image: postgres:16-alpine
    container_name: invoice_db
    restart: unless-stopped 
    env_file:
      - ./invoice_app_backend/.env
    expose:
      - "5432"
    volumes:
      # Named volume for safe persistent PostgreSQL storage
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d invoice_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Admin pgadmin4 (No Forward public)
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_dev
    restart: unless-stopped 
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
    expose:
      - "8888"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # 3. Backend Go (Internal)
  backend:
    image: ${DEPLOY_DOCKER_IMAGE}
    container_name: invoice_backend
    restart: unless-stopped 
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./invoice_app_backend/.env
    environment:
      - APP_ENV=production
    expose:
      - "8090"
    volumes:
      # Mount for release apk
      - ./invoice_app_frontend/pubspec.yaml:/root/invoice_app_frontend/pubspec.yaml:ro
      - ./invoice_app_frontend/build/app/outputs/flutter-apk/app-release.apk:/root/invoice_app_frontend/build/app/outputs/apk/release/app-release.apk:ro
      # Mount backup folder
      - ${BACKUP_FOLDER_PATH}:/root/backups
      # Mount printing folder
      - ${PRINT_FOLDER_PATH}:/root/printing_folder
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8090 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 4. Frontend Web (Forward public)
  gateway:
    image: nginx:alpine
    container_name: invoice_gateway
    restart: unless-stopped 
    ports:
      - "${DEPLOY_HTTP_PORT:-27080}:80"
      - "${DEPLOY_HTTPS_PORT:-27443}:443"
    volumes:
      # Mount front-end built web
      - ./invoice_app_frontend/build/web:/usr/share/nginx/html:ro
      # Mount Nginx config
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount SSL certificate
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy

  # 5. Certbot - DNS Challenge Auto Renewal (Cloudflare)
  certbot:
    build:
      context: ./certbot
      dockerfile: Dockerfile
    container_name: invoice_certbot
    restart: unless-stopped
    environment:
      - DOMAIN=${DOMAIN}
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    volumes:
      # Certbot persistent data (certs, accounts, etc.) mounted directly to host directory for easy monitoring
      - ./nginx/letsencrypt:/etc/letsencrypt
      # Shared with nginx — certbot writes fullchain.pem & privkey.pem here
      - ./nginx/ssl:/etc/nginx/ssl
      # Docker socket to send reload signal to nginx container
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      gateway:
        condition: service_started

volumes:
  pgadmin_data:
  postgres_data: