version: "2"
sql:
  - schema: "db/migrations" # sqlc sẽ đọc các file .up.sql để biết cấu trúc bảng
    queries: "db/queries"    # Nơi bạn viết các file .sql chứa câu lệnh SELECT/INSERT
    engine: "postgresql"
    gen:
      go:
        package: "db"        # Tên package Go
        out: "db/sqlc"       # Thư mục chứa code Go được sinh ra
        emit_json_tags: true # Tự thêm tag json cho struct (để trả về cho Flutter)